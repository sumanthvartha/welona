/* ═══════════════════════ HAIR CONDITION SVGs ═══════════════════════ */

function HairConditionHead({ stage, size = 120 }) {
  const cx = 60, cy = 55, rx = 38, ry = 36;

  function makeStrands() {
    const strands = [];
    const seed = stage === "early" ? 1 : stage === "moderate" ? 2 : 3;
    // Use deterministic random based on position for consistent rendering
    function pRand(x, y, s) { return ((Math.sin(x * 12.9898 + y * 78.233 + s) * 43758.5453) % 1 + 1) % 1; }

    for (let row = 0; row < 14; row++) {
      for (let col = 0; col < 12; col++) {
        const bx = 24 + col * 7 + (row % 2) * 3.5;
        const by = 20 + row * 5.5;
        const dx = (bx - cx) / rx;
        const dy = (by - cy) / ry;
        if (dx * dx + dy * dy > 0.85) continue;

        const crownDist = Math.sqrt(Math.pow(bx - 58, 2) + Math.pow(by - 40, 2));
        const frontDist = by - 22;
        const partDist = Math.abs(bx - 60);
        const hash = (bx * 7 + by * 13 + seed) % 10;
        const r = pRand(bx, by, seed);

        let opacity, thickness;

        if (stage === "early") {
          if (hash < 2 && crownDist < 14) continue;
          if (hash < 1 && partDist < 4) continue;
          opacity = 0.55 + r * 0.25;
          thickness = 1.3 + r * 0.5;
        } else if (stage === "moderate") {
          if (crownDist < 8 && hash < 5) continue;
          if (crownDist < 16 && hash < 3) continue;
          if (partDist < 5 && hash < 4) continue;
          if (frontDist < 6 && hash < 3) continue;
          const sideFactor = bx < 35 || bx > 85 ? 1.2 : 1;
          const crownThin = crownDist < 18 ? 0.4 : 0.8;
          opacity = (0.35 + r * 0.25) * crownThin * sideFactor;
          thickness = 1.0 + r * 0.4;
        } else {
          const topZone = by < 50 && bx > 32 && bx < 88;
          if (topZone && crownDist < 25 && hash < 7) continue;
          if (topZone && hash < 5) continue;
          if (frontDist < 10 && bx > 35 && bx < 85 && hash < 8) continue;
          const isSide = bx < 34 || bx > 86 || by > 62;
          if (!isSide && hash < 4) continue;
          opacity = isSide ? 0.5 + r * 0.3 : 0.15 + r * 0.15;
          thickness = isSide ? 1.3 + r * 0.4 : 0.7 + r * 0.3;
        }

        const angle = ((bx - 60) * 0.02) + (r - 0.5) * 0.3;
        const len = 5 + r * 4;
        strands.push({ x1: bx, y1: by, x2: bx + Math.sin(angle) * len, y2: by - Math.cos(angle) * len, o: opacity, w: thickness });
      }
    }
    return strands;
  }

  const strands = makeStrands();
  const conditionLabel = stage === "early" ? "Early Hair Fall" : stage === "moderate" ? "Moderate Thinning" : "Advanced Hair Loss";
  const conditionColor = stage === "early" ? "#4a7c59" : stage === "moderate" ? "#8b5a2b" : "#2d5a7b";

  return (
    <div style={{ textAlign: "center" }}>
      <svg viewBox="0 0 120 105" width={size} height={size * 0.875} fill="none">
        <defs>
          <radialGradient id={"scalp-" + stage} cx="50%" cy="45%" r="50%">
            <stop offset="0%" stopColor="#F5DFC8" />
            <stop offset="70%" stopColor="#EEDCC5" />
            <stop offset="100%" stopColor="#E5CDB5" />
          </radialGradient>
        </defs>
        <ellipse cx="18" cy="55" rx="5" ry="8" fill="#EEDCC5" stroke="#DFC9AF" strokeWidth="0.6" />
        <ellipse cx="102" cy="55" rx="5" ry="8" fill="#EEDCC5" stroke="#DFC9AF" strokeWidth="0.6" />
        <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={"url(#scalp-" + stage + ")"} stroke="#DFC9AF" strokeWidth="1" />
        {stage === "advanced" && <Fragment><ellipse cx="58" cy="38" rx="16" ry="12" fill="#F2DDC8" opacity="0.4" /><ellipse cx="60" cy="44" rx="12" ry="8" fill="#F5E2CE" opacity="0.3" /></Fragment>}
        {stage === "moderate" && <ellipse cx="59" cy="40" rx="8" ry="6" fill="#F2DDC8" opacity="0.25" />}
        {strands.map((s, i) => (
          <line key={i} x1={s.x1} y1={s.y1} x2={s.x2} y2={s.y2} stroke="#3A2518" strokeWidth={s.w} strokeLinecap="round" opacity={s.o} />
        ))}
        {(stage === "early" || stage === "moderate") && (
          <line x1="60" y1="22" x2="59" y2="52" stroke="#E5CDB5" strokeWidth={stage === "moderate" ? 2.5 : 1.5} strokeLinecap="round" opacity="0.4" />
        )}
        {stage === "early" && <Fragment>
          <line x1="40" y1="78" x2="36" y2="92" stroke="#3A2518" strokeWidth="0.8" opacity="0.2" strokeLinecap="round" />
          <line x1="65" y1="80" x2="68" y2="94" stroke="#3A2518" strokeWidth="0.8" opacity="0.18" strokeLinecap="round" />
          <line x1="80" y1="76" x2="84" y2="88" stroke="#3A2518" strokeWidth="0.8" opacity="0.15" strokeLinecap="round" />
          <line x1="50" y1="82" x2="46" y2="96" stroke="#3A2518" strokeWidth="0.7" opacity="0.12" strokeLinecap="round" />
        </Fragment>}
      </svg>
      <div style={{ fontSize: "11px", fontWeight: 700, color: conditionColor, marginTop: "4px", letterSpacing: "0.3px" }}>{conditionLabel}</div>
    </div>
  );
}

  function pRand(i) { return ((Math.sin(i * 45.164) * 43758.5453) % 1 + 1) % 1; }
  const afterHairs = Array.from({ length: 22 }, (_, i) => ({
    x: 26 + (i % 6) * 13 + (Math.floor(i / 6) % 2) * 6,
    y: 16 + Math.floor(i / 6) * 10,
    h: 18 + pRand(i) * 6,
    o: 0.5 + pRand(i + 50) * 0.3,
  }));

  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "12px", padding: "20px 0" }}>
      <div style={{ textAlign: "center" }}>
        <svg viewBox="0 0 120 100" width="140" height="116" fill="none">
          <ellipse cx="60" cy="55" rx="42" ry="38" fill="#FDEBD0" stroke="#E8D5C0" strokeWidth="1.2" />
          {beforeHairs.map((h, i) => (
            <line key={i} x1={h.x} y1={h.y} x2={h.x + (i % 2 ? 1 : -1)} y2={h.y - h.h} stroke="#5C4033" strokeWidth="1.6" strokeLinecap="round" opacity={h.o} />
          ))}
          {type === "falling" && <Fragment>
            <line x1="34" y1="70" x2="30" y2="82" stroke="#5C4033" strokeWidth="1" opacity="0.25" strokeLinecap="round" />
            <line x1="55" y1="72" x2="58" y2="86" stroke="#5C4033" strokeWidth="1" opacity="0.2" strokeLinecap="round" />
            <line x1="78" y1="68" x2="82" y2="80" stroke="#5C4033" strokeWidth="1" opacity="0.22" strokeLinecap="round" />
            <line x1="44" y1="74" x2="40" y2="88" stroke="#5C4033" strokeWidth="1" opacity="0.18" strokeLinecap="round" />
          </Fragment>}
          {type === "transplant" && <ellipse cx="58" cy="28" rx="20" ry="10" fill="#FDEBD0" stroke="#E8D5C0" strokeWidth="0.8" strokeDasharray="3 2" opacity="0.6" />}
        </svg>
        <div style={{ fontSize: "12px", color: "#bbb", fontWeight: 600, marginTop: "4px" }}>Before</div>
      </div>
      <svg viewBox="0 0 50 30" width="50" height="30" fill="none">
        <path d="M5 15 L38 15" stroke="#4a7c59" strokeWidth="2.5" strokeLinecap="round" />
        <path d="M32 8 L40 15 L32 22" stroke="#4a7c59" strokeWidth="2.5" strokeLinecap="round" fill="none" />
      </svg>
      <div style={{ textAlign: "center" }}>
        <svg viewBox="0 0 120 100" width="140" height="116" fill="none">
          <ellipse cx="60" cy="55" rx="42" ry="38" fill="#FDEBD0" stroke="#E8D5C0" strokeWidth="1.2" />
          {afterHairs.map((h, i) => (
            <line key={i} x1={h.x} y1={h.y} x2={h.x + (i % 3 === 0 ? 1 : i % 3 === 1 ? -1 : 0.5)} y2={h.y - h.h} stroke="#3D2B1F" strokeWidth="1.8" strokeLinecap="round" opacity={h.o} />
          ))}
        </svg>
        <div style={{ fontSize: "12px", color: "#4a7c59", fontWeight: 700, marginTop: "4px" }}>After</div>
      </div>
    </div>
  );
}

function getRecommendation(a) {
  let s = { gfc: 0, prp: 0, transplant: 0 };
  if (a.noticing === "falling") { s.gfc += 3; s.prp += 1; }
  if (a.noticing === "thinning") { s.gfc += 1; s.prp += 3; }
  if (a.noticing === "patches") { s.prp += 1; s.transplant += 3; }
  if (a.noticing === "receding") { s.prp += 1; s.transplant += 3; }
  if (a.duration === "recent") { s.gfc += 3; s.prp += 1; }
  if (a.duration === "months") { s.gfc += 2; s.prp += 2; }
  if (a.duration === "year") { s.prp += 3; s.transplant += 1; }
  if (a.duration === "years") { s.prp += 1; s.transplant += 3; }
  if (a.goal === "stop") { s.gfc += 3; s.prp += 2; }
  if (a.goal === "thicken") { s.prp += 3; s.gfc += 1; }
  if (a.goal === "fill") { s.transplant += 3; s.prp += 1; }
  const sorted = Object.entries(s).sort((a, b) => b[1] - a[1]);
  return { primary: sorted[0][0], secondary: sorted[1][0] };
}

function stageFor(key) { return key === "gfc" ? "early" : key === "prp" ? "moderate" : "advanced"; }

function FadeIn({ children, delay = 0 }) {
  const [v, setV] = useState(false);
  useEffect(() => { const t = setTimeout(() => setV(true), delay); return () => clearTimeout(t); }, [delay]);
  return <div style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(20px)", transition: "all 0.5s cubic-bezier(0.22,1,0.36,1)" }}>{children}</div>;
}

function SafetyBar({ score, color }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
      <div style={{ flex: 1, height: "8px", borderRadius: "4px", background: "#eee", overflow: "hidden" }}>
        <div style={{ width: score + "%", height: "100%", borderRadius: "4px", background: score > 90 ? "#4a7c59" : score > 80 ? "#C9A96E" : "#D98B5A", transition: "width 1s ease" }} />
      </div>
      <span style={{ fontSize: "14px", fontWeight: 700, color: color }}>{score}%</span>
    </div>
  );
}

function SeverityDot({ level }) {
  const c = level === "low" ? "#4a7c59" : level === "med" ? "#D4A030" : "#C75050";
  const l = level === "low" ? "Common & mild" : level === "med" ? "Uncommon" : "Rare";
  return <span style={{ fontSize: "10px", fontWeight: 700, color: c, textTransform: "uppercase", letterSpacing: "0.5px" }}>{l}</span>;
}

function OptionBtn({ icon, label, sub, selected, onClick }) {
  return (
    <button onClick={onClick} style={{ display: "flex", alignItems: "center", gap: "14px", width: "100%", padding: "18px 20px", border: selected ? "2px solid #2d5a7b" : "2px solid #eae7e2", borderRadius: "14px", background: selected ? "#f4f8fb" : "#fff", cursor: "pointer", textAlign: "left", transition: "all 0.2s", fontFamily: "inherit", outline: "none" }}>
      <span style={{ fontSize: "24px", flexShrink: 0 }}>{icon}</span>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: "15px", fontWeight: 600, color: "#1a1a1a" }}>{label}</div>
        {sub && <div style={{ fontSize: "13px", color: "#999", marginTop: "2px" }}>{sub}</div>}
      </div>
    </button>
  );
}

function ProgressDots({ current, total }) {
  return (
    <div style={{ display: "flex", gap: "8px", justifyContent: "center", marginBottom: "28px" }}>
      {Array.from({ length: total }).map((_, i) => <div key={i} style={{ width: i <= current ? "24px" : "8px", height: "8px", borderRadius: "4px", background: i <= current ? "#2d5a7b" : "#ddd", transition: "all 0.4s" }} />)}
    </div>
  );
}

    </div>
  );
}

        </div>
      )}

      {/* QUIZ */}
      {view === V.Q1 && <FadeIn><button onClick={() => go(V.HOME)} style={S.back}>← Back</button><h2 style={{ ...S.serif, fontSize: "26px", marginBottom: "8px" }}>What are you noticing?</h2><p style={{ color: "#999", fontSize: "14px", marginBottom: "24px" }}>Pick what fits you best.</p><div style={{ display: "flex", flexDirection: "column", gap: "12px" }}><OptionBtn icon="🚿" label="Hair falling more than usual" sub="More on pillow, shower, or comb" onClick={() => pick("noticing","falling",V.Q2)} /><OptionBtn icon="🔍" label="Hair getting thinner overall" sub="Less volume, scalp more visible" onClick={() => pick("noticing","thinning",V.Q2)} /><OptionBtn icon="⭕" label="Bald patches or spots" sub="Areas where hair stopped growing" onClick={() => pick("noticing","patches",V.Q2)} /><OptionBtn icon="📐" label="Hairline moving back" sub="Forehead bigger, temples receding" onClick={() => pick("noticing","receding",V.Q2)} /></div></FadeIn>}

      {view === V.Q2 && <FadeIn><button onClick={() => go(V.Q1)} style={S.back}>← Back</button><h2 style={{ ...S.serif, fontSize: "26px", marginBottom: "8px" }}>How long has this been going on?</h2><p style={{ color: "#999", fontSize: "14px", marginBottom: "24px" }}>Helps us understand what stage you're at.</p><div style={{ display: "flex", flexDirection: "column", gap: "12px" }}><OptionBtn icon="🌤" label="Just started noticing" sub="Past few weeks" onClick={() => pick("duration","recent",V.Q3)} /><OptionBtn icon="🌥" label="A few months now" sub="2–6 months" onClick={() => pick("duration","months",V.Q3)} /><OptionBtn icon="☁️" label="Over a year" sub="Been dealing with it a while" onClick={() => pick("duration","year",V.Q3)} /><OptionBtn icon="🌧" label="Several years" sub="It's been a long journey" onClick={() => pick("duration","years",V.Q3)} /></div></FadeIn>}

      {view === V.Q3 && <FadeIn><button onClick={() => go(V.Q2)} style={S.back}>← Back</button><h2 style={{ ...S.serif, fontSize: "26px", marginBottom: "8px" }}>What matters most to you?</h2><p style={{ color: "#999", fontSize: "14px", marginBottom: "24px" }}>What would success look like?</p><div style={{ display: "flex", flexDirection: "column", gap: "12px" }}><OptionBtn icon="🛡" label="Stop the hair fall" sub="Keep what I have" onClick={() => pick("goal","stop",V.QR)} /><OptionBtn icon="💫" label="Get thickness back" sub="Fuller, denser hair" onClick={() => pick("goal","thicken",V.QR)} /><OptionBtn icon="🎯" label="Fill in bald areas" sub="Hair where it's completely gone" onClick={() => pick("goal","fill",V.QR)} /></div></FadeIn>}

      {/* QUIZ RESULT */}
      {view === V.QR && rec && (() => {
        const p = SERVICES[rec.primary], alt = SERVICES[rec.secondary];
        return (
          <div>
            <FadeIn>
              <button onClick={() => go(V.Q3)} style={S.back}>← Back</button>
              <div style={{ textAlign: "center", marginBottom: "24px" }}>
                <div style={{ display: "inline-block", padding: "6px 18px", background: p.light, color: p.color, borderRadius: "50px", fontSize: "11px", fontWeight: 700, letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "16px" }}>Recommended for you</div>
                <h2 style={{ ...S.serif, fontSize: "28px", marginBottom: "6px" }}>{p.name}</h2>
                <p style={{ fontSize: "15px", color: "#777", lineHeight: 1.7, maxWidth: "420px", margin: "0 auto" }}>{p.oneLiner}</p>
              </div>
            </FadeIn>
            <FadeIn delay={150}><div style={{ background: "#fff", borderRadius: "18px", padding: "12px", border: "1px solid #eee", marginBottom: "16px" }}><BeforeAfterHead type={p.beforeAfterType} /></div></FadeIn>
            <FadeIn delay={250}><button onClick={() => openGuide(rec.primary)} style={{ ...S.btnPrimary, background: p.color, boxShadow: "0 6px 24px " + p.color + "30", marginBottom: "12px" }}>See full guide for {p.name} →</button></FadeIn>
            <FadeIn delay={350}>
              <div style={{ ...S.card, marginBottom: "16px" }}>
                <div style={{ fontSize: "10px", fontWeight: 700, textTransform: "uppercase", letterSpacing: "1.5px", color: "#ccc", marginBottom: "12px" }}>Also worth exploring</div>
                <button onClick={() => openGuide(rec.secondary)} style={{ display: "flex", alignItems: "center", gap: "14px", width: "100%", background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", padding: 0, textAlign: "left" }}>
                  <div style={{ width: "52px", flexShrink: 0 }}><HairConditionHead stage={stageFor(rec.secondary)} size={52} /></div>
                  <div style={{ flex: 1 }}><div style={{ fontSize: "15px", fontWeight: 700 }}>{alt.name}</div><div style={{ fontSize: "12px", color: "#999" }}>{alt.bestFor}</div></div>
                  <span style={{ color: "#ccc", fontSize: "18px" }}>›</span>
                </button>
              </div>
            </FadeIn>
            <FadeIn delay={450}>
              <button onClick={() => go(V.COMPARE)} style={{ ...S.btnOutline, color: "#666", borderColor: "#ddd", marginBottom: "12px" }}>⚖️  Compare all three treatments</button>
              <button onClick={restart} style={{ width: "100%", padding: "14px", fontSize: "14px", fontWeight: 500, color: "#aaa", background: "none", border: "none", cursor: "pointer", fontFamily: "inherit" }}>Start over</button>
            </FadeIn>
          </div>
        );
      })()}

      {view === V.GUIDE && guideKey && <ServiceGuide serviceKey={guideKey} onBack={() => go(V.HOME)} onCompare={() => go(V.COMPARE)} />}
      {view === V.COMPARE && <ComparisonTool onBack={() => go(V.HOME)} onGuide={(key) => openGuide(key)} />}
    </div>
  );
}

ReactDOM.render(<HairHub />, document.getElementById("root"));
</script>
</body>
</html>
